name: PR Checks

on:
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --run

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Java (required by Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build project (with emulator config)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: fake-api-key-for-emulator
          VITE_FIREBASE_AUTH_DOMAIN: demo-goals-tracker.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: demo-goals-tracker
          VITE_FIREBASE_STORAGE_BUCKET: demo-goals-tracker.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          VITE_FIREBASE_APP_ID: "1:123456789:web:abcdef123456"
          VITE_USE_EMULATOR: "true"

      - name: Start Firebase Emulators
        run: firebase emulators:start --only auth,firestore --project demo-goals-tracker &
        env:
          FIREBASE_CLI_EXPERIMENTS: none

      - name: Wait for Firebase emulators to be ready
        run: |
          echo "Waiting for Firebase Auth emulator on port 9099..."
          for i in $(seq 1 60); do
            if curl --output /dev/null --silent http://localhost:9099; then
              echo "Auth emulator is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: auth emulator not ready yet, waiting..."
            sleep 2
          done
          echo "Waiting for Firebase Firestore emulator on port 8080..."
          for i in $(seq 1 60); do
            if curl --output /dev/null --silent http://localhost:8080; then
              echo "Firestore emulator is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: firestore emulator not ready yet, waiting..."
            sleep 2
          done

      - name: Create test user in Auth emulator
        run: |
          echo "Creating test user in Firebase Auth emulator..."
          curl -s -X POST \
            "http://localhost:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=fake-api-key-for-emulator" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"Test@12345","returnSecureToken":true}'
          echo ""
          echo "Test user created."

      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.ts
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
